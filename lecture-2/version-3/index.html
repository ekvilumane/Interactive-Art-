<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>

  <body>
    <a-scene background="color: #000">
      <!-- Camera -->
      <a-camera position="0 4 20"></a-camera>

      <!-- Sun -->
      <a-sphere
        position="0 0 -15"
        radius="3"
        color="#FDB813"
        animation__color="property: components.material.material.color; type: color; to: #FFE066; dir: alternate; loop: true; dur: 2000; easing: easeInOutSine"
        animation__scale="property: scale; to: 1.05 1.05 1.05; dir: alternate; loop: true; dur: 2000; easing: easeInOutSine"
      >
      </a-sphere>

      <!-- Earth -->
      <a-entity
        position="0 0 -15"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
      >
        <a-sphere
          position="7 0 0"
          radius="1"
          color="#2E86C1"
          animation__scale="property: scale; to: 1.1 1.1 1.1; dir: alternate; loop: true; dur: 1500; easing: easeInOutCubic"
          animation__color="property: components.material.material.color; type: color; to: #5DADE2; dir: alternate; loop: true; dur: 1500; easing: easeInOutCubic"
        >
        </a-sphere>
      </a-entity>

      <!-- Mars -->
      <a-entity
        position="0 0 -15"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear"
      >
        <a-sphere
          position="11 0 0"
          radius="0.7"
          color="#C0392B"
          animation__scale="property: scale; to: 1.08 1.08 1.08; dir: alternate; loop: true; dur: 2000; easing: easeInOutCubic"
          animation__color="property: components.material.material.color; type: color; to: #E74C3C; dir: alternate; loop: true; dur: 2000; easing: easeInOutCubic"
        >
        </a-sphere>
      </a-entity>

      <!--  New Planet (strong visible scaling) -->
      <a-entity
        position="0 0 -15"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 16000; easing: linear"
      >
        <a-sphere
          position="15 0 0"
          radius="0.9"
          color="#6C5CE7"
          animation__scale="property: scale; to: 1.4 1.4 1.4; dir: alternate; loop: true; dur: 1200; easing: easeInOutCubic"
          animation__color="property: components.material.material.color; type: color; to: #A29BFE; dir: alternate; loop: true; dur: 1200; easing: easeInOutCubic"
        >
        </a-sphere>
      </a-entity>

      <!-- Star -->
      <a-sphere
        position="-6 3 -18"
        radius="0.3"
        color="#FFFFFF"
        animation="property: scale; to: 1.3 1.3 1.3; dir: alternate; loop: true; dur: 800; easing: easeInOutCubic"
      >
      </a-sphere>

      <!--  Animated Sky (night ↔ dawn) -->
      <a-sky
        color="#000010"
        animation="property: components.material.material.color; type: color; to: #4A6FA5; dir: alternate; loop: true; dur: 8000; easing: easeInOutSine"
      >
      </a-sky>
    </a-scene>
  </body>
</html>
