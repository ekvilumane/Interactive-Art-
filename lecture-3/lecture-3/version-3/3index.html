<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>
  </head>

  <body>
    <a-scene fog="type: exponential; color: #f4e1b9; density: 0.04">
      <a-camera position="0 1.7 6"></a-camera>

      <a-entity
        environment="
          preset: egypt;

          ground: hills;
          groundYScale: 5;
          groundTexture: walkernoise;

          groundColor: #d9a441;
          groundColor2: #f2c572;

          dressing: pyramids;
          dressingAmount: 40;
          dressingScale: 3 8 3;
          dressingVariance: 4 6 4;
          dressingColor: #c0852b;

          skyType: gradient;
          skyColor: #f4a261;
          horizonColor: #fefae0;

          fog: 0.7;
        "
      >
      </a-entity>

      <a-dodecahedron
        position="-1 0.6 -2"
        radius="0.6"
        color="#a4712b"
      ></a-dodecahedron>
      <a-dodecahedron
        position="1 0.5 -2.5"
        radius="0.5"
        color="#8d5524"
      ></a-dodecahedron>

      <a-cone
        position="-3 0 -5"
        radius-bottom="1.5"
        height="2.5"
        color="#c0852b"
      ></a-cone>
      <a-cone
        position="3 0 -6"
        radius-bottom="2"
        height="3"
        color="#b07d2d"
      ></a-cone>

      <a-cone
        position="0 0 -10"
        radius-bottom="4"
        height="5"
        color="#d9a441"
      ></a-cone>

      <a-cylinder
        position="-2 1 -4"
        radius="0.1"
        height="2"
        color="#6b8e23"
      ></a-cylinder>
      <a-cylinder
        position="2 0.8 -5"
        radius="0.1"
        height="1.6"
        color="#556b2f"
      ></a-cylinder>

      <a-sphere
        position="0 1 -3"
        radius="0.15"
        color="#fefae0"
        opacity="0.3"
        animation="property: position; to: 0 2 -3; loop: true; dur: 6000"
      >
      </a-sphere>

      <a-sphere
        position="1 1.2 -4"
        radius="0.1"
        color="#faedcd"
        opacity="0.25"
        animation="property: position; to: 1 2.5 -4; loop: true; dur: 7000"
      >
      </a-sphere>

      <a-light type="ambient" color="#fefae0" intensity="0.7"></a-light>
      <a-light
        type="directional"
        position="2 5 3"
        color="#ffd166"
        intensity="1"
      ></a-light>
    </a-scene>
  </body>
</html>
