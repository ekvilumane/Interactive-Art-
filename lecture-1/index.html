<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>
      <!-- Камера -->
      <a-camera position="0 1.6 4"></a-camera>

      <!-- Земля -->
      <a-plane
        position="0 0 -4"
        rotation="-90 0 0"
        width="10"
        height="10"
        color="#eaeaea"
      >
      </a-plane>

      <!-- ОСНОВА ДОМА -->
      <a-box position="0 1 -4" width="2" height="2" depth="2" color="#E63946">
        <!-- красный -->
      </a-box>

      <!-- КРЫША -->
      <a-cone
        position="0 2.5 -4"
        radius-bottom="1.6"
        radius-top="0"
        height="1.5"
        color="#1D3557"
      >
        <!-- тёмно-синий -->
      </a-cone>

      <!-- ДВЕРЬ -->
      <a-box
        position="0 0.5 -2.99"
        width="0.5"
        height="1"
        depth="0.05"
        color="#F1FA3C"
      >
        <!-- жёлтый -->
      </a-box>

      <!-- ОКНО ЛЕВО -->
      <a-box
        position="-0.6 1.2 -2.99"
        width="0.4"
        height="0.4"
        depth="0.05"
        color="#A8DADC"
      >
        <!-- светлый голубой -->
      </a-box>

      <!-- ОКНО ПРАВО -->
      <a-box
        position="0.6 1.2 -2.99"
        width="0.4"
        height="0.4"
        depth="0.05"
        color="#A8DADC"
      >
      </a-box>

      <!-- СОЛНЦЕ (чтобы было "дизайнерски") -->
      <a-sphere position="3 4 -6" radius="0.5" color="#FFD166"> </a-sphere>

      <!-- НЕБО -->
      <a-sky color="#f5f5f5"></a-sky>
    </a-scene>
  </body>
</html>
